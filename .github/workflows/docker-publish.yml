name: Build and publish Docker images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 2.3.1). Leave blank for latest only."
        required: false
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  # --- Tor image: amd64 on GitHub, arm64 on self-hosted, then merge ---

  build-tor-amd64:
    name: Build Tor image (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: OnionPress.app/Contents/Resources/docker/tor
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/brewsterkahle/onionpress-tor:build-amd64
          cache-from: type=gha,scope=tor-amd64
          cache-to: type=gha,mode=max,scope=tor-amd64

  build-tor-arm64:
    name: Build Tor image (arm64)
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
      - name: Set up buildx
        run: docker buildx create --name arm64builder --use 2>/dev/null || docker buildx use arm64builder
      - name: Build and push (arm64)
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            -t ${{ env.REGISTRY }}/brewsterkahle/onionpress-tor:build-arm64 \
            OnionPress.app/Contents/Resources/docker/tor

  merge-tor:
    name: Merge Tor manifests
    runs-on: ubuntu-latest
    needs: [build-tor-amd64, build-tor-arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create -t ${{ env.REGISTRY }}/brewsterkahle/onionpress-tor:latest \
            ${{ env.REGISTRY }}/brewsterkahle/onionpress-tor:build-amd64 \
            ${{ env.REGISTRY }}/brewsterkahle/onionpress-tor:build-arm64

          if [ -n "${{ inputs.version }}" ]; then
            docker buildx imagetools create -t ${{ env.REGISTRY }}/brewsterkahle/onionpress-tor:${{ inputs.version }} \
              ${{ env.REGISTRY }}/brewsterkahle/onionpress-tor:build-amd64 \
              ${{ env.REGISTRY }}/brewsterkahle/onionpress-tor:build-arm64
          fi

  # --- WordPress image: amd64 on GitHub, arm64 on self-hosted, then merge ---

  build-wp-amd64:
    name: Build WordPress image (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: OnionPress.app/Contents/Resources/docker/wordpress
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/brewsterkahle/onionpress-wordpress:build-amd64
          cache-from: type=gha,scope=wp-amd64
          cache-to: type=gha,mode=max,scope=wp-amd64

  build-wp-arm64:
    name: Build WordPress image (arm64)
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
      - name: Set up buildx
        run: docker buildx create --name arm64builder --use 2>/dev/null || docker buildx use arm64builder
      - name: Build and push (arm64)
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            -t ${{ env.REGISTRY }}/brewsterkahle/onionpress-wordpress:build-arm64 \
            OnionPress.app/Contents/Resources/docker/wordpress

  merge-wp:
    name: Merge WordPress manifests
    runs-on: ubuntu-latest
    needs: [build-wp-amd64, build-wp-arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create -t ${{ env.REGISTRY }}/brewsterkahle/onionpress-wordpress:latest \
            ${{ env.REGISTRY }}/brewsterkahle/onionpress-wordpress:build-amd64 \
            ${{ env.REGISTRY }}/brewsterkahle/onionpress-wordpress:build-arm64

          if [ -n "${{ inputs.version }}" ]; then
            docker buildx imagetools create -t ${{ env.REGISTRY }}/brewsterkahle/onionpress-wordpress:${{ inputs.version }} \
              ${{ env.REGISTRY }}/brewsterkahle/onionpress-wordpress:build-amd64 \
              ${{ env.REGISTRY }}/brewsterkahle/onionpress-wordpress:build-arm64
          fi
