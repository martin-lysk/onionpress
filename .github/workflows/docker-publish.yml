name: Build and publish Docker images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 2.3.1). Leave blank for latest only."
        required: false
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build-tor:
    name: Build Tor/Arti image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build and push Tor image
        uses: docker/build-push-action@v6
        with:
          context: OnionPress.app/Contents/Resources/docker/tor
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/brewsterkahle/onionpress-tor:latest
            ${{ inputs.version && format('{0}/brewsterkahle/onionpress-tor:{1}', env.REGISTRY, inputs.version) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-wordpress:
    name: Build WordPress image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build and push WordPress image
        uses: docker/build-push-action@v6
        with:
          context: OnionPress.app/Contents/Resources/docker/wordpress
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/brewsterkahle/onionpress-wordpress:latest
            ${{ inputs.version && format('{0}/brewsterkahle/onionpress-wordpress:{1}', env.REGISTRY, inputs.version) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
