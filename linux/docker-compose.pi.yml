# OnionPress Raspberry Pi / headless override
# Binds WordPress to all interfaces so LAN devices can access it
# for initial setup at http://<pi-ip>:8080
#
# SECURITY NOTE: This exposes WordPress on your local network.
# If your Pi is on an untrusted network, configure a firewall
# (e.g. ufw allow from 192.168.0.0/16 to any port 8080).

services:
  wordpress:
    ports:
      - "0.0.0.0:${ONIONPRESS_WP_PORT:-8080}:80"
