services:
  tor:
    image: ghcr.io/brewsterkahle/onionpress-tor:latest
    build: ./tor
    container_name: onionpress-tor
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ulimits:
      nofile:
        soft: 10000
        hard: 10000
    environment:
      - TZ=${TZ:-UTC}
      - TOR_IMPL=${TOR_IMPL:-tor}
      - ONIONPRESS_VERSION=${ONIONPRESS_VERSION:-unknown}
    volumes:
      - arti-state:/var/lib/arti/
      - tor-state:/var/lib/tor/
      - onionpress-data:/var/lib/onionpress
    depends_on:
      - wordpress
    restart: unless-stopped
    networks:
      - onionpress-network
    ports:
      - "127.0.0.1:${ONIONPRESS_SOCKS_PORT:-9050}:9050"

  wordpress:
    image: ghcr.io/brewsterkahle/onionpress-wordpress:latest
    build: ./wordpress
    container_name: onionpress-wordpress
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - TZ=${TZ:-UTC}
      - WORDPRESS_DB_HOST=db:3306
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=${WORDPRESS_DB_PASSWORD}
      - WORDPRESS_DB_NAME=wordpress
      - WORDPRESS_CONFIG_EXTRA=
          $$scheme = 'http';
          if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') $$scheme = 'https';
          define('WP_HOME', $$scheme . '://' . $$_SERVER['HTTP_HOST']);
          define('WP_SITEURL', $$scheme . '://' . $$_SERVER['HTTP_HOST']);
          define('FORCE_SSL_ADMIN', false);
          define('COOKIE_DOMAIN', preg_replace('/:\d+$$/', '', $$_SERVER['HTTP_HOST']));
    volumes:
      - wordpress-data:/var/www/html
      - onionpress-data:/var/lib/onionpress
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - onionpress-network
    ports:
      - "127.0.0.1:${ONIONPRESS_WP_PORT:-8080}:80"

  db:
    image: mariadb:latest
    container_name: onionpress-db
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - TZ=${TZ:-UTC}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=wordpress
      - MYSQL_USER=wordpress
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - onionpress-network

  tor-client:
    image: ghcr.io/brewsterkahle/onionpress-tor:latest
    build: ./tor
    container_name: onionpress-tor-client
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ulimits:
      nofile:
        soft: 10000
        hard: 10000
    environment:
      - TZ=${TZ:-UTC}
      - TOR_IMPL=${TOR_IMPL:-tor}
      - NO_ONION_SERVICE=1
    volumes:
      - arti-state-client:/var/lib/arti/
    restart: unless-stopped
    networks:
      - onionpress-network

  onionheaven:
    image: ${ONIONHEAVEN_IMAGE:-ghcr.io/brewsterkahle/onionpress-tor:latest}
    build: ./tor
    container_name: onionheaven
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ulimits:
      nofile:
        soft: 10000
        hard: 10000
    environment:
      - TZ=${TZ:-UTC}
      - TOR_IMPL=${TOR_IMPL:-tor}
      - NO_ONION_SERVICE=1
      - ONIONHEAVEN=${ONIONHEAVEN:-0}
      - ONIONPRESS_VERSION=${ONIONPRESS_VERSION:-unknown}
      - TOR_PROPAGATION_DELAY=${ONIONHEAVEN_PROPAGATION_DELAY:-180}
      - ONIONHEAVEN_TAKEOVER_SCALE_THRESHOLD=${ONIONHEAVEN_MAX_SERVICES:-50}
    volumes:
      - arti-state-polling:/var/lib/arti/
      - onionpress-data:/var/lib/onionpress
    restart: unless-stopped
    networks:
      - onionpress-network
    profiles:
      - onionheaven

volumes:
  arti-state:
    name: onionpress-arti-state
  tor-state:
    name: onionpress-tor-state
  arti-state-client:
    name: onionpress-arti-state-client
  arti-state-polling:
    name: onionpress-arti-state-polling
  wordpress-data:
    name: onionpress-wordpress-data
  db-data:
    name: onionpress-db-data
  onionpress-data:
    name: onionpress-persistent-data

networks:
  onionpress-network:
    name: onionpress-network
    driver: bridge
