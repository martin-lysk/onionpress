# Arti config for onionheaven-polling container (SOCKS proxy + keystore for takeover)
[logging]
console = "info,arti_client=debug,tor_hsservice=debug,tor_guardmgr=debug,tor_circmgr=debug"

[proxy]
socks_listen = "0.0.0.0:9050"

[path_rules]
# Restrict to IPv4 only — Colima/Docker has no IPv6 routes,
# so IPv6 relay connections fail with "Network unreachable"
reachable_addrs = ["0.0.0.0/0:*"]

[storage]
cache_dir = "/var/lib/arti/cache"
state_dir = "/var/lib/arti/state"

[storage.keystore]
enabled = true

[vanguards]
# Disable vanguards on takeover workers — they serve temporary 302 redirects,
# not sensitive content. Vanguards constrain relay selection, causing circuit
# exhaustion cascades when hosting many onion services (77%+ circuit death rate).
mode = "disabled"
