[logging]
console = "info,tor_hsservice=debug"

[proxy]
socks_listen = "0.0.0.0:9050"

[address_filter]
allow_onion_addrs = true

[path_rules]
# Restrict to IPv4 only — Colima/Docker has no IPv6 routes,
# so IPv6 relay connections fail with "Network unreachable"
reachable_addrs = ["0.0.0.0/0:*"]

[storage]
cache_dir = "/var/lib/arti/cache"
state_dir = "/var/lib/arti/state"

[storage.keystore]
enabled = true

[onion_services."wordpress"]
enabled = true
# Arti requires IP addresses (no hostnames). socat on 127.0.0.1:8080
# forwards to wordpress:80 — started by entrypoint.sh.
proxy_ports = [["80", "127.0.0.1:8080"]]
num_intro_points = 3

[onion_services."healthcheck"]
enabled = true
proxy_ports = [["80", "127.0.0.1:8081"]]

[vanguards]
# Disable vanguards — they add overhead on low-resource devices (Pi) and cause
# noisy "unbootstrapped vanguard manager" errors during startup. OnionPress
# serves public WordPress content, not sensitive hidden services.
mode = "disabled"
